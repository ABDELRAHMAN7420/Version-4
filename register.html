<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Deviation Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

<main class="login-wrap">
  <div class="login-card">
    <a href="index.html" class="logo" style="justify-content:center; margin-bottom:28px;">
      <span class="dot"></span>Deviation Tracker
    </a>

    <h1 class="login-title">Create your account</h1>
    <p class="login-sub">It only takes a few seconds.</p>

    <form id="register-form">
      <div class="form-field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="At least 6 characters" minlength="6">
      </div>
      <div class="form-field">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" name="confirm-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" id="register-submit-btn" style="width:100%; justify-content:center;">Create Account</button>
      <p id="register-status" class="form-status"></p>
    </form>

    <p style="margin-top:22px; font-size:0.88rem; color:var(--color-muted);">
      Already have an account? <a href="index.html" style="color:var(--color-data); font-weight:600;">Sign in</a>
    </p>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js?v=3"></script>
<script src="js/auth.js?v=3"></script>
<script src="js/main.js?v=3"></script>
<script>
  redirectIfLoggedIn();

  var form = document.getElementById('register-form');
  var submitBtn = document.getElementById('register-submit-btn');
  var statusEl = document.getElementById('register-status');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var confirmPassword = document.getElementById('confirm-password').value;

    statusEl.classList.remove('ok');

    if (password !== confirmPassword) {
      statusEl.textContent = 'كلمة السر وتأكيدها مش متطابقين.';
      return;
    }

    submitBtn.textContent = 'Creating account...';
    submitBtn.disabled = true;

    registerUser(email, password, function (errorMessage) {
      statusEl.textContent = errorMessage;
      submitBtn.textContent = 'Create Account';
      submitBtn.disabled = false;
    }, function () {
      statusEl.textContent = 'Account created! Redirecting...';
      statusEl.classList.add('ok');
      setTimeout(function () {
        window.location.href = 'analysis.html';
      }, 400);
    });
  });
</script>
</body>
</html>
