<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Deviation Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

<main class="login-wrap">
  <div class="login-card">
    <a href="index.html" class="logo" style="justify-content:center; margin-bottom:28px;">
      <span class="dot"></span>Deviation Tracker
    </a>

    <h1 class="login-title">Sign in to your account</h1>
    <p class="login-sub">Enter your email and password to continue.</p>

    <form id="login-form">
      <div class="form-field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" id="login-submit-btn" style="width:100%; justify-content:center;">Sign In</button>
      <p id="login-status" class="form-status"></p>
    </form>

    <p style="margin-top:22px; font-size:0.88rem; color:var(--color-muted);">
      Don't have an account? <a href="register.html" style="color:var(--color-data); font-weight:600;">Create one</a>
    </p>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js?v=3"></script>
<script src="js/auth.js?v=3"></script>
<script src="js/main.js?v=3"></script>
<script>
  // لو المستخدم داخل بالفعل، وديه على طول للأداة
  redirectIfLoggedIn();

  var form = document.getElementById('login-form');
  var submitBtn = document.getElementById('login-submit-btn');
  var statusEl = document.getElementById('login-status');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;

    statusEl.textContent = '';
    statusEl.classList.remove('ok');
    submitBtn.textContent = 'Signing in...';
    submitBtn.disabled = true;

    loginUser(email, password, function (errorMessage) {
      statusEl.textContent = errorMessage;
      submitBtn.textContent = 'Sign In';
      submitBtn.disabled = false;
    }, function () {
      statusEl.textContent = 'Welcome back! Redirecting...';
      statusEl.classList.add('ok');
      setTimeout(function () {
        window.location.href = 'analysis.html';
      }, 400);
    });
  });
</script>
</body>
</html>
